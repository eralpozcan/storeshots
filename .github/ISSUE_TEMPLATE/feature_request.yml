name: Feature Request
description: Suggest a new feature or improvement for Storeshots
title: "[Feature]: "
labels: ["enhancement", "feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Before submitting, please check if a similar request already exists.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is your feature request related to a problem? Describe it clearly.
      placeholder: I'm frustrated when... / It would be helpful if...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - Editor / Canvas
        - Templates & Layouts
        - Device Mockups
        - Export / Download
        - Import / Upload
        - UI / UX
        - Performance
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking my use of Storeshots
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any screenshots, mockups, or examples that illustrate your request.
